# Goldilocks - VPA-based resource recommendations (recommendation-only mode)
# VPA recommender runs but does NOT auto-apply changes to pods.
# Use the Goldilocks dashboard to view recommendations and manually set
# resource requests/limits in Git.

# VPA subchart — recommender only (updater + admission controller disabled)
vpa:
  enabled: true
  admissionController:
    enabled: false
  updater:
    enabled: false
  recommender:
    extraArgs:
      v: "4"
      pod-recommendation-min-cpu-millicores: 15
      pod-recommendation-min-memory-mb: 100
      # Increase margin from default 0.15 (15%) to 0.40 (40%)
      # Gives VPA recommendations more headroom so HPA memory
      # utilization stays well below the 50% target threshold
      recommendation-margin-fraction: "0.40"

# Controller — creates VPA objects for workloads automatically
controller:
  enabled: true
  rbac:
    create: true
    enableArgoproj: true
    extraRules:
      # Goldilocks needs services access to resolve owner chains for pods
      # managed by service-backed controllers (e.g. vcluster StatefulSets)
      - apiGroups: [""]
        resources: ["services"]
        verbs: ["get", "list", "watch"]
  flags:
    # Monitor all namespaces without requiring opt-in labels
    on-by-default: "true"
    # Exclude system namespaces and trivy-system (ephemeral scan jobs
    # create unresolvable owner chains that spam controller logs)
    exclude-namespaces: "kube-system,kube-public,kube-node-lease,goldilocks,trivy-system"
    # VPA update mode: Off = recommendation-only (no pod mutations)
    # Goldilocks dashboard still shows recommendations for all workloads
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      memory: 512Mi

# Dashboard — web UI for viewing resource recommendations
dashboard:
  enabled: true
  replicaCount: 1
  flags:
    on-by-default: "true"
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Expose via Gateway API HTTPRoute
  httpRoute:
    enabled: true
    parentRefs:
      - name: nginx-gateway
        namespace: nginx-gateway
        sectionName: https
    hostnames:
      - goldilocks.cluster.integratn.tech
    matches:
      - path:
          type: PathPrefix
          value: /
