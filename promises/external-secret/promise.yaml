apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: external-secret
  labels:
    kratix.io/promise-type: platform
    kratix.io/promise-version: v1alpha1
spec:
  destinationSelectors:
    - matchLabels:
        capability.vcluster: "true"

  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: externalsecrets.platform.integratn.tech
    spec:
      group: platform.integratn.tech
      scope: Namespaced
      names:
        plural: externalsecrets
        singular: externalsecret
        kind: PlatformExternalSecret
        shortNames:
          - pes
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  required:
                    - namespace
                    - secrets
                  properties:
                    namespace:
                      type: string
                      description: Target namespace for the ExternalSecret resources
                      pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                      maxLength: 63
                    appName:
                      type: string
                      description: Application name for labeling (defaults to resource name)
                      pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                      maxLength: 63
                    secretStoreName:
                      type: string
                      description: ClusterSecretStore name (defaults to onepassword-store)
                      default: onepassword-store
                    secretStoreKind:
                      type: string
                      description: SecretStore kind
                      default: ClusterSecretStore
                      enum:
                        - ClusterSecretStore
                        - SecretStore
                    ownerPromise:
                      type: string
                      description: Name of the parent promise that created this request (for labeling)
                    secrets:
                      type: array
                      description: List of ExternalSecrets to create
                      minItems: 1
                      items:
                        type: object
                        required:
                          - onePasswordItem
                          - keys
                        properties:
                          name:
                            type: string
                            description: "Secret name (defaults to {appName}-{onePasswordItem})"
                          onePasswordItem:
                            type: string
                            description: Item name in 1Password vault
                          keys:
                            type: array
                            description: Key mappings from 1Password to K8s Secret
                            minItems: 1
                            items:
                              type: object
                              required:
                                - secretKey
                                - property
                              properties:
                                secretKey:
                                  type: string
                                  description: Key in the Kubernetes Secret
                                property:
                                  type: string
                                  description: Property name in the 1Password item
                status:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true

  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: external-secret-configure
          spec:
            containers:
              - name: configure
                image: ghcr.io/jamesatintegratnio/external-secret-configure:latest
                imagePullPolicy: Always
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 65532
                  capabilities:
                    drop: ["ALL"]
                  seccompProfile:
                    type: RuntimeDefault
      delete:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: external-secret-delete
          spec:
            containers:
              - name: delete
                image: ghcr.io/jamesatintegratnio/external-secret-configure:latest
                imagePullPolicy: Always
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 65532
                  capabilities:
                    drop: ["ALL"]
                  seccompProfile:
                    type: RuntimeDefault
