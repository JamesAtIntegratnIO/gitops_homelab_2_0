# ── Full-featured example ────────────────────────────────
# Demonstrates all available fields for an HTTP Service.
apiVersion: platform.integratn.tech/v1alpha1
kind: HTTPService
metadata:
  name: my-api
  namespace: platform-requests
spec:
  name: my-api
  namespace: my-api
  team: backend

  # Container image
  image:
    repository: ghcr.io/myorg/my-api
    tag: v1.2.3
    pullPolicy: IfNotPresent

  # Scaling
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  # Networking — app listens on port 3000
  port: 3000
  ingress:
    enabled: true
    hostname: my-api.cluster.integratn.tech
    path: /

  # Secrets from 1Password
  secrets:
    - name: my-api-db
      onePasswordItem: my-api-database-credentials
      keys:
        - secretKey: DATABASE_URL
          property: connection-string
        - secretKey: DB_PASSWORD
          property: password
    - onePasswordItem: my-api-oauth
      keys:
        - secretKey: CLIENT_ID
          property: client-id
        - secretKey: CLIENT_SECRET
          property: client-secret

  # Plain environment variables
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    PORT: "3000"

  # Health checks
  healthCheck:
    path: /health
    port: 3000

  # Monitoring
  monitoring:
    enabled: true
    path: /metrics
    interval: 15s

  # Persistent storage
  persistence:
    enabled: true
    size: 5Gi
    storageClass: longhorn
    mountPath: /app/data

  # Escape hatch — raw Stakater chart values merged on top
  # helmOverrides:
  #   deployment:
  #     tolerations:
  #       - key: "dedicated"
  #         operator: "Equal"
  #         value: "app"
  #         effect: "NoSchedule"
